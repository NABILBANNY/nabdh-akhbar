function rgba(hex,a){
  if(hex.startsWith("hsl"))return hex.replace("hsl(","hsla(").replace(")",`,${a})`);
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);

async function genComment(title,summary){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:"أنت محلل إخباري عربي متخصص. قدّم تعليقاً تحليلياً موجزاً (3-4 جمل) موضوعياً بلغة عربية فصيحة. أجب مباشرةً بالتعليق فقط.",
        messages:[{role:"user",content:`العنوان: ${title}\nالملخص: ${summary}`}]}),
    });
    const d=await res.json();return d.content?.[0]?.text||"تعذّر توليد التعليق.";
  }catch(e){return"تعذّر الاتصال بمحرك التحليل.";}
}

function Clock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  return <span>{t.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"})}</span>;
}

function StatusBar(){
  const pwa=isStandalone();

  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 20px 0",color:"#E2E8F0",fontSize:12,fontWeight:600,flexShrink:0}}>

}

function CountryTab({label,flag,active,onClick,accent,count}){

function App(){

  const [lastA,setLastA]=useState(new Date());
  const [tab,setTab]=useState("home");
  const [activeCountry,setActiveCountry]=useState("الكل");
  const [savedIds,setSavedIds]=useState(new Set());
  const [savedNews,setSavedNews]=useState([]);
  const [drawerNews,setDrawerNews]=useState(null);
  const [wh1,setWh1]=useState("https://your-n8n.com/webhook/news");
  const [wh2,setWh2]=useState("https://your-n8n.com/webhook/analyses");

  // Detect if running as PWA — full screen no phone shell
  const pwa=isStandalone();

  const doLoadNews=async()=>{setLoadN(true);const d=await fetchNews();setNews(d);setLastN(new Date());setLoadN(false);};
  const doLoadAn=async()=>{setLoadA(true);const d=await fetchAnalyses();setAnalyses(d);setLastA(new Date());setLoadA(false);};
  useEffect(()=>{doLoadNews();doLoadAn();},[]);
  useEffect(()=>{
    const t1=setInterval(doLoadNews,ri*1000);
    const t2=setInterval(doLoadAn,ri*1000);
    return()=>{clearInterval(t1);clearInterval(t2);};
  },[ri]);

  const toggleSave=(item)=>{
    setSavedIds(prev=>{
      const next=new Set(prev);
      if(next.has(item.id)){next.delete(item.id);setSavedNews(s=>s.filter(n=>n.id!==item.id));}
      else{next.add(item.id);setSavedNews(s=>[item,...s]);}
      return next;
    });
  };

  const urgentCount=news.filter(n=>n.urgent).length;
  const navItems=[
    {id:"home",   icon:"🏠", label:"الأخبار"},
    {id:"analyse",icon:"🏛️", label:"تحاليل"},
    {id:"notif",  icon:"🔔", label:"تنبيهات"},
    {id:"saved",  icon:"📌", label:"محفوظة"},
    {id:"settings",icon:"⚙️",label:"الإعدادات"},

  // Shell styles: phone frame on desktop, full screen on mobile/PWA

        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        {tab==="analyse"&&<AnalysesScreen analyses={analyses} loading={loadA} onRefresh={doLoadAn} lastUpdate={lastA}/>}

}

<script>
// ══════════════════════════════════════════════
//  SERVICE WORKER — PWA offline support
// ══════════════════════════════════════════════
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'nabdh-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if(e.request.method !== 'GET') return;
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ══════════════════════════════════════════════
//  PWA INSTALL PROMPT
// ══════════════════════════════════════════════
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const closeBtn = document.getElementById('install-close');

// Show banner for mobile browsers that support beforeinstallprompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Only show if not already installed
  if(!window.matchMedia('(display-mode: standalone)').matches){
    setTimeout(() => banner.classList.remove('hidden'), 2000);
  }
});

installBtn.addEventListener('click', async () => {
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.add('hidden');
  }
});

closeBtn.addEventListener('click', () => {
  banner.classList.add('hidden');
});

// iOS Safari — show manual instructions
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
const isInStandaloneMode = window.navigator.standalone;
if(isIOS && !isInStandaloneMode){
  setTimeout(()=>{
    const iosBanner = document.getElementById('install-banner');
    const iosBtn = document.getElementById('install-btn');

    iosBtn.addEventListener('click', () => iosBanner.classList.add('hidden'), {once:true});
    iosBanner.classList.remove('hidden');
  }, 2500);
}

// Hide banner when app installed
window.addEventListener('appinstalled', () => banner.classList.add('hidden'));
</script>
